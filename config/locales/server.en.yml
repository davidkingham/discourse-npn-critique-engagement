en:
  site_settings:
    npn_critique_engagement_enabled: "Enable critique engagement scoring, recognition, and moderation tools."
    npn_critique_category: "The category whose give-and-take is scored, together with its subcategories (Image Critiques)."
    npn_critique_window_days: "The rolling scoring window: standing always reflects the trailing this-many days, recomputed nightly. Tier boundaries were tuned on 90 days."
    npn_critique_min_reply_length: "Minimum characters (after stripping quoted text) for a reply to count as a critique at all."
    npn_critique_medium_reply_length: "Characters at which a critique earns the medium multiplier."
    npn_critique_long_reply_length: "Characters at which a critique earns the long multiplier."
    npn_critique_medium_reply_multiplier: "Weight multiplier for medium-length critiques."
    npn_critique_long_reply_multiplier: "Weight multiplier for long critiques."
    npn_critique_like_bonus: "Bonus per like received on a critique."
    npn_critique_like_bonus_cap: "Maximum like bonus a single critique can earn."
    npn_critique_award_reactions: "Reaction names that count as awards on a critique. Legacy names can stay listed so past awards keep counting."
    npn_critique_award_bonus: "Bonus per award reaction received on a critique."
    npn_critique_award_bonus_cap: "Maximum total award bonus a single critique can earn."
    npn_critique_owner_award_multiplier: "Multiplier when the award comes from the topic owner — the member whose work was critiqued."
    npn_critique_top_critiques_count: "How many most-awarded critiques the monthly highlights topic and the hall of fame showcase."
    npn_critique_editors_pick_tag: "The tag the editors' pick review queue applies when staff make a pick."
    npn_critique_coverage_days: "How many days back the moderator dashboard looks for images still waiting for a substantive critique."
    npn_critique_coverage_excluded_tags: "Topics with these tags don't need critique coverage. Weekly-challenge announcement topics are always excluded; challenge entries are covered."
    npn_critique_coverage_excluded_title_prefixes: "Topics whose title starts with any of these don't need critique coverage — catches announcement topics created before the weekly-challenge plugin marked them."
    npn_critique_pick_excluded_tags: "Tags that aren't pick genres and stay off the weekly pick status board (style and attribute tags)."
    npn_fair_feed_enabled: "Replace the homepage with the composed feed: editors' picks, work waiting for a first critique, new-member intros, reserved conversation slots, and photographers you haven't met."
    npn_fair_feed_anonymous: "Show the composed homepage to logged-out visitors too. Off by default so crawlers and first-time visitors keep Latest."
    npn_fair_feed_picks_limit: "How many genres the editors' picks carousel shows — one pick per genre, newest genre first. At or above your genre count, it shows them all."
    npn_fair_feed_waiting_limit: "How many photos the waiting lane shows. Deliberately small — it's a call to action, not the page."
    npn_fair_feed_new_members_limit: "How many new-member introductions the 'say hello' lane shows."
    npn_fair_feed_conversation_limit: "Slots reserved for discussions. These are kept however much the critique category posts — that reservation is the whole point of the lane."
    npn_fair_feed_unmet_limit: "How many photos the 'photographers you haven't met' lane shows."
    npn_fair_feed_conversation_categories: "Categories the conversation lane draws from. Leave blank to use every category outside the critique and new-member trees."
    npn_fair_feed_freshness_days: "A lane hides anything older than this, and renders nothing at all rather than showing stale content."
    npn_fair_feed_min_aspect: "Narrowest shape an image may be shown in. A taller portrait is letterboxed inside this box rather than cropped."
    npn_fair_feed_max_aspect: "Widest shape an image may be shown in. A wider panorama is letterboxed inside this box rather than cropped."
    npn_discussion_prompt_enabled: "Post a weekly question into the discussion category, so discussions have something to answer rather than relying on someone remembering to start a thread."
    npn_discussion_prompt_category: "The category the weekly question is posted into."
    npn_discussion_prompt_questions: "The question bank. One question per entry; the job posts the next one each week and cycles back to the start once it reaches the end."
    npn_discussion_prompt_day: "The weekday the question goes up. The job posts on or after this day each week, so a missed run is caught up rather than skipped."
    npn_discussion_prompt_pin: "Pin the weekly question in its category, unpinning the previous week's."
    npn_discussion_prompt_body: "The post body. %{question} is the prompt itself (also the title). Leave blank to use the built-in invitation."
    npn_fair_feed_row_height: "Target height in pixels for a justified row. Rows stretch to fill the width from there, so this is a target rather than an exact height."
    npn_fair_feed_max_row_height: "How tall a justified row may grow. Without this, a row that isn't full stretches its images across the whole width and towers over the rows above it."
    npn_fair_waiting_boost_per_day: "How much a topic with no substantive critique climbs the fair ordering for each day it keeps waiting."
    npn_fair_waiting_boost_cap: "Ceiling on the waiting boost, so a long-neglected topic can't pin itself to the top forever."
    npn_fair_new_member_boost: "One-off boost in the fair ordering while the poster is inside the new-member grace window."
    npn_fair_recency_weight: "Weight of ordinary recency decay in the fair ordering — how much the feed favours fresh posts."
    npn_fair_recency_half_life_days: "Days over which the recency term halves."
    npn_fair_reciprocity_weight: "How strongly the poster's give-and-take standing shifts their topics in the fair ordering."
    npn_fair_reciprocity_floor: "The most the standing term can ever subtract. Floored on purpose: a low score moves a topic down, but must never bury it."
    npn_critique_new_member_category: "The New Members category (with its subcategories) surfaced on the moderator dashboard."
    npn_critique_new_member_min_replies: "New-member posts stay on the dashboard until they have this many replies — every new member deserves more than one response."
    npn_critique_claim_expiry_days: "Outreach claims quietly expire after this many days so a forgotten claim never blocks a member."
    npn_critique_claim_reminder_hours: "PM the claiming moderator once, if the contact hasn't been logged after this many hours (checked nightly). 0 disables the reminder."
    npn_critique_editors_pick_badge_name: "Badge granted to the photographer when their image is picked, tied to the image post. Leave blank to skip."
    npn_critique_editors_pick_pm_enabled: "Send the photographer a congratulations PM when their image is picked."
    npn_critique_pick_finalize_minutes: "Undo window for editors' picks: the tag, public note, badge, and PM only happen after this many minutes, so an accidental pick can be undone before the member ever knows. 0 publishes immediately."
    npn_critique_award_badges_enabled: "Each month, grant post-tied badges for comments that received award reactions during the month."
    npn_critique_award_badge_map: "Which badge each award reaction earns, as reaction=badge name pairs."
    npn_critique_award_badge_min_reactions: "Award reactions a comment needs in a month to earn its badge."
    npn_critique_followup_multiplier: "Credit multiplier for follow-up critiques in the same thread."
    npn_critique_followup_cap: "How many follow-up critiques per thread earn partial credit; later replies earn nothing."
    npn_critique_target_ratio: "Threads-critiqued to topics-posted ratio at which the ratio bonus maxes out."
    npn_critique_grace_period_days: "New members are never penalized while their account is younger than this."
    npn_critique_grace_topic_dump_threshold: "Topics posted with zero threads critiqued at which a new member loses the grace score protection."
    npn_critique_excellent_score: "Score at which a member reaches the Excellent tier."
    npn_critique_healthy_score: "Score at which a member reaches the Healthy tier."
    npn_critique_watch_floor_score: "Score below which a member drops out of the Watch tier."
    npn_critique_outreach_min_topics: "Topics posted at which a below-floor member becomes priority outreach rather than low activity."
    npn_critique_badges_enabled: "Grant recognition badges when a season closes."
    npn_critique_contributor_badge_name: "Name of the monthly bronze badge for reaching Healthy."
    npn_critique_supporter_badge_name: "Name of the monthly silver badge for reaching Excellent."
    npn_critique_pillar_badge_name: "Name of the permanent gold badge."
    npn_critique_pillar_required_months: "Excellent months required within the window to earn the permanent badge."
    npn_critique_pillar_window_months: "Trailing window (months) evaluated for the permanent badge."
    npn_critique_supporter_flair_group: "Group whose membership is replaced each season with last month's Excellent members (for flair). Plugin-managed."
    npn_critique_pillar_flair_group: "Group permanent badge earners are added to (for flair). Plugin-managed, members are never removed."
    npn_critique_rising_enabled: "Each month, spotlight the most generous new critic: a one-time badge, a distinct chip for the following month, and a mention in the highlights topic."
    npn_critique_rising_badge_name: "Name of the one-time new-member spotlight badge."
    npn_critique_rising_new_user_days: "How young (in days) an account must be at month end to qualify as a new member."
    npn_critique_rising_min_weighted: "Minimum weighted critique count to win — quiet months award nobody."
    npn_critique_chips_enabled: "Show public recognition chips next to poster names and on the user card."
    npn_critique_chip_min_tier: "Lowest tier that earns a recognition chip. 'excellent' shows chips for Guides and Stewards only; 'healthy' also marks Contributors."
    npn_critique_leaderboard_size: "How many top critics the leaderboard and monthly highlights topic show."
    npn_critique_nudge_enabled: "Show a dismissible give-and-take reminder above the composer when a member below the healthy ratio starts a new topic in the critique category."
    npn_critique_nudge_ratio: "Show the reminder when a member's threads-critiqued to topics-posted ratio is below this."
    npn_critique_nudge_copy: "Custom reminder text. Placeholders: %%{shared}, %%{critiqued}. Leave blank for the default copy."
    npn_critique_season_topic_enabled: "Post a pinned monthly highlights topic in the critique category naming the month's top critics."
    npn_critique_season_topic_author: "Username that authors the monthly highlights topic."
    npn_critique_season_topic_pin_days: "How many days the monthly highlights topic stays pinned. 0 to skip pinning."
  system_messages:
    npn_outreach_claim_reminder:
      subject_template: "Reminder: you offered to reach out to @%{member_username}"
      text_body_template: |
        Hi @%{username},

        A quick nudge: you marked that you'd reach out to @%{member_username}, and the contact hasn't been logged yet.

        If you've already been in touch, please log a quick note on the [outreach page](%{base_url}/moderate/outreach) so the claim clears and the other moderators can see it's handled. If you can't get to it, no worries — release the claim there so someone else can pick it up.

        Thanks for looking after the community!
    npn_editors_pick:
      subject_template: "Your image was selected as an Editor's Pick!"
      text_body_template: |
        Congratulations, @%{username}! :star:

        Your image [%{topic_title}](%{topic_url}) was selected as an Editor's Pick — one of the images our moderators felt stood above the rest. It now carries the editors-pick tag, and the Editor's Pick badge has been added to your profile.

        Thank you for sharing your work with the community. We'd love to see more of it — and remember, the critique threads are where the real magic happens.
    npn_rising_critic:
      subject_template: "You're our Rising Critic of the month!"
      text_body_template: |
        Congratulations, @%{username}! :seedling:

        You gave more thoughtful critiques than any other new member in %{month} — %{weighted} weighted critiques in your first weeks with us. That's exactly what makes this community work, and it hasn't gone unnoticed: you've been awarded the **%{badge_name}** badge, and for the next month a Rising Critic mark will appear next to your name.

        Thank you for diving straight in. Keep sharing your eye — members who critique regularly get more feedback on their own work, too.
  npn_critique_engagement:
    filter_tips:
      order_fair: "fairly — work still waiting for a first critique, spread across members"
    discussion_prompt:
      default_body: |
        %{question}

        Jump in below — there's no wrong answer, and we'd love to hear how you see it.
    editors_picks:
      already_picked: "This topic is already an editors' pick."
      not_picked: "This topic isn't an editors' pick."
    outreach:
      already_claimed: "@%{username} is already reaching out to this member."
      pm_sent_note: 'Sent a private message: "%{title}"'
    badges:
      contributor_description: "Reached Healthy critique engagement in a calendar month"
      supporter_description: "Reached Excellent critique engagement in a calendar month"
      pillar_description: "Sustained Excellent critique engagement over many months — the rarest honor this community gives"
      rising_description: "Dove straight into give-and-take as a new member: the month's most generous new critic"
      editors_pick_description: "Image selected as an Editor's Pick by the moderators"
      award_badge_description: "Received a community award for an exceptional contribution"
    highlights_topic:
      title: "Critique highlights — %{month}"
      table_header: |-
        | Rank | Member | Weighted critiques |
        |---|---|---|
      body: |
        Thank you to everyone who gave their time and eyes to other members' work in %{month} — this category runs on your generosity.

        ## Top critics of %{month}

        %{winners}

        Every substantive critique counts, whenever you give it — visit a few threads and join the conversation. See where you stand on the [leaderboard](%{base_url}/critique-engagement/leaderboard), and browse the [hall of fame](%{base_url}/critique-engagement/hall-of-fame) for the best critiques ever written here.
      rising_line: "🌱 **Rising critic of the month:** @%{username} — %{weighted} weighted critiques in their first weeks. Welcome, and thank you for diving straight in!"
      awarded_section_title: "Most awarded critiques of %{month}"
      awarded_line:
        one: "%{rank}. @%{username} in [%{topic_title}](%{url}) — %{count} award"
        other: "%{rank}. @%{username} in [%{topic_title}](%{url}) — %{count} awards"

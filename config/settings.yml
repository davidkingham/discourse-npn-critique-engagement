plugins:
  npn_critique_engagement_enabled:
    default: false
    client: true

  npn_critique_category:
    default: ""
    type: category
    client: true

  # Rolling scoring window: standing always reflects the trailing N days,
  # recomputed nightly. Nothing ever resets.
  npn_critique_window_days:
    default: 90
    min: 7
    max: 365
    client: true

  # --- Scoring formula ---------------------------------------------------
  # All values were tuned against live NPN data in the Data Explorer
  # prototype; they will need tuning again. Nothing is hard-coded.

  npn_critique_min_reply_length:
    default: 100
    min: 1

  npn_critique_medium_reply_length:
    default: 300
    min: 1

  npn_critique_long_reply_length:
    default: 800
    min: 1

  npn_critique_medium_reply_multiplier:
    default: 1.5
    type: float

  npn_critique_long_reply_multiplier:
    default: 2.0
    type: float

  npn_critique_like_bonus:
    default: 0.2
    type: float

  npn_critique_like_bonus_cap:
    default: 1.0
    type: float

  # Award reactions (from discourse-reactions) are deliberate quality
  # endorsements and outweigh plain likes. Legacy names are kept so awards
  # given before the custom emojis existed still count.
  npn_critique_award_reactions:
    default: "award-thoughtful|award-processing|award-critique|award-helped-my-work|star2|control_knobs|trophy"
    type: list

  npn_critique_award_bonus:
    default: 0.5
    type: float

  npn_critique_award_bonus_cap:
    default: 1.5
    type: float

  npn_critique_owner_award_multiplier:
    default: 2.0
    type: float

  npn_critique_top_critiques_count:
    default: 10
    min: 1
    max: 50

  npn_critique_followup_multiplier:
    default: 0.3
    type: float

  npn_critique_followup_cap:
    default: 2
    min: 0

  npn_critique_target_ratio:
    default: 2.0
    type: float

  npn_critique_grace_period_days:
    default: 30
    min: 0

  npn_critique_grace_topic_dump_threshold:
    default: 3
    min: 1

  # --- Tier boundaries ----------------------------------------------------

  npn_critique_excellent_score:
    default: 400
    min: -100000

  npn_critique_healthy_score:
    default: 100
    min: -100000

  npn_critique_watch_floor_score:
    default: -100
    min: -100000

  npn_critique_outreach_min_topics:
    default: 6
    min: 1

  # --- Badges & flair -----------------------------------------------------

  npn_critique_badges_enabled:
    default: false

  npn_critique_contributor_badge_name:
    default: "Critique Contributor"
    client: true

  npn_critique_supporter_badge_name:
    default: "Critique Guide"
    client: true

  npn_critique_pillar_badge_name:
    default: "Critique Steward"
    client: true

  npn_critique_pillar_required_months:
    default: 6
    min: 1

  npn_critique_pillar_window_months:
    default: 12
    min: 1

  npn_critique_supporter_flair_group:
    default: ""
    type: group

  npn_critique_pillar_flair_group:
    default: ""
    type: group

  # --- Rising critic (new-member spotlight) -----------------------------------

  npn_critique_rising_enabled:
    default: false
    client: true

  npn_critique_rising_badge_name:
    default: "Rising Critic"
    client: true

  npn_critique_rising_new_user_days:
    default: 60
    min: 1

  npn_critique_rising_min_weighted:
    default: 3.0
    type: float

  # --- Editors' picks -----------------------------------------------------------

  npn_critique_editors_pick_tag:
    default: "editors-pick"
    type: tag_list
    client: true

  npn_critique_coverage_days:
    default: 14
    min: 1
    max: 90

  npn_critique_coverage_excluded_tags:
    default: ""
    type: tag_list

  npn_critique_coverage_excluded_title_prefixes:
    default: "Weekly Challenge:"
    type: list

  npn_critique_pick_excluded_tags:
    default: "black-and-white|grand|intimate"
    type: tag_list
    client: true

  # --- Fair feed ranking --------------------------------------------------
  # The weights behind `order:fair` and the homepage feed. Four independent
  # terms: how fast a neglected topic climbs, the new-member boost, ordinary
  # recency decay, and the author's give-and-take standing. The standing term
  # is deliberately floored — it can move a topic down but must never bury
  # it, so a quiet member never becomes invisible and the negative signal
  # never leaks onto a public surface.

  npn_fair_waiting_boost_per_day:
    default: 6.0
    type: float

  npn_fair_waiting_boost_cap:
    default: 60.0
    type: float

  npn_fair_new_member_boost:
    default: 80.0
    type: float

  npn_fair_recency_weight:
    default: 40.0
    type: float

  npn_fair_recency_half_life_days:
    default: 3.0
    type: float
    min: 0.5

  npn_fair_reciprocity_weight:
    default: 0.15
    type: float

  # Never below this, no matter how negative the author's standing.
  npn_fair_reciprocity_floor:
    default: -25.0
    type: float

  # --- Fair feed homepage -------------------------------------------------
  # The composed homepage. Lanes are allocations, not a ranking: the
  # conversation lane keeps its slots however much the critique category
  # posts, which is the only thing that stops the highest-volume category
  # burying every other one. A lane with nothing fresh renders nothing at
  # all rather than showing stale content.

  npn_fair_feed_enabled:
    default: false
    client: true

  # Off by default: anonymous visitors keep Latest, which is the crawlable
  # surface.
  npn_fair_feed_anonymous:
    default: false

  # Who gets the custom homepage. Empty means every logged-in member (plus
  # anonymous, if that setting is on) — the full rollout. Set it to a group
  # to beta-test in production: only those members see the feed, everyone
  # else keeps Latest, and anonymous visitors are excluded regardless of the
  # anonymous setting.
  npn_fair_feed_allowed_groups:
    type: group_list
    list_type: compact
    default: ""
    allow_any: false

  # Core lets a member's own "Default Home Page" preference win over any custom
  # homepage, so members who once picked a homepage never see the feed. With
  # this on, the feed takes precedence over that preference for its audience —
  # the way to actually roll it out to existing members. Turn it off to respect
  # each member's chosen homepage instead.
  npn_fair_feed_override_homepage_preference:
    default: true

  # One pick per genre, so this caps how many genres the carousel shows. The
  # carousel scrolls, so a value at or above the genre count shows them all.
  npn_fair_feed_picks_limit:
    default: 12
    min: 1
    max: 24

  # The genres the picks carousel shows, in display order, as
  # `slug:Label` pairs — slug is the pick's genre tag, Label is what the card
  # shows. The order here is the order of the carousel. Genres not listed fall
  # to the end, most-recently-picked first.
  npn_fair_feed_pick_genres:
    type: list
    list_type: simple
    default: "abstract:Abstract|astro:Astro|birds:Birds|landscape:Landscape|macro-close-up:Macro/Close-up|non-nature:Non-Nature|plant-life:Plant Life|weekly-challenge:Weekly Challenge|wildlife:Wildlife"

  # Deliberately small. The waiting lane is a call to action, not the page —
  # capping it is what keeps a weak photo from shaping a visitor's first
  # impression of the community.
  npn_fair_feed_waiting_limit:
    default: 8
    min: 1
    max: 24

  npn_fair_feed_new_members_limit:
    default: 4
    min: 1
    max: 12

  npn_fair_feed_conversation_limit:
    default: 6
    min: 1
    max: 20

  npn_fair_feed_unmet_limit:
    default: 6
    min: 1
    max: 20

  # The closing "Latest" catch-all lane: everything recently active the
  # curated lanes above didn't already surface.
  npn_fair_feed_latest_limit:
    default: 24
    min: 1
    max: 60

  # Categories the "join the conversation" lane draws from. Leave blank to
  # use every category outside the critique tree.
  npn_fair_feed_conversation_categories:
    default: ""
    type: category_list

  # A lane shows nothing rather than something stale beyond this age.
  npn_fair_feed_freshness_days:
    default: 21
    min: 1
    max: 120

  # Justified rows: uniform height, variable width, never cropped. Target
  # height in pixels; rows stretch to fill the container from there.
  npn_fair_feed_row_height:
    default: 240
    min: 120
    max: 600
    client: true

  # A row that isn't full still stretches its items to fill the width, which
  # left unchecked makes a two-item row tower over a full one. This caps how
  # tall a row may grow; the leftover width stays empty instead.
  npn_fair_feed_max_row_height:
    default: 360
    min: 120
    max: 900
    client: true

  # Aspect clamps. A 3:1 panorama would otherwise eat a whole row and a 2:3
  # portrait would shrink to a sliver. Past these the image is letterboxed
  # inside a clamped box — contained, never cropped.
  npn_fair_feed_min_aspect:
    default: 0.55
    type: float
    client: true

  npn_fair_feed_max_aspect:
    default: 3.0
    type: float
    client: true

  # --- Discussion prompt --------------------------------------------------
  # A visibility lane keeps discussions in front of people, but it can't fill
  # an empty room. A weekly question posted into the discussion category
  # gives members something to answer. The prompts are a bank the job rotates
  # through, one per week, so nobody has to remember to start the thread.

  npn_discussion_prompt_enabled:
    default: false

  npn_discussion_prompt_category:
    default: ""
    type: category

  # The prompt bank. One question per entry; the job posts the next one each
  # week and cycles back to the start once it reaches the end.
  npn_discussion_prompt_questions:
    default: ""
    type: list
    list_type: simple

  # Which weekday the question goes up. The job posts on or after this day
  # each week, so a missed run is caught up rather than skipped.
  npn_discussion_prompt_day:
    default: "monday"
    type: enum
    choices:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
      - saturday
      - sunday

  npn_discussion_prompt_pin:
    default: true

  # The post body. %{question} is the prompt itself (also the title). Leave
  # blank to use the built-in invitation.
  npn_discussion_prompt_body:
    default: ""
    type: text

  npn_critique_new_member_category:
    default: ""
    type: category

  npn_critique_new_member_min_replies:
    default: 2
    min: 1

  npn_critique_claim_expiry_days:
    default: 2
    min: 1
    max: 30

  npn_critique_claim_reminder_hours:
    default: 24
    min: 0
    max: 168

  npn_critique_editors_pick_badge_name:
    default: "Editor's Pick"

  npn_critique_editors_pick_pm_enabled:
    default: true

  npn_critique_pick_finalize_minutes:
    default: 10
    min: 0
    max: 120

  # --- Award badges (post-tied, granted monthly from award reactions) ---------

  npn_critique_award_badges_enabled:
    default: false

  npn_critique_award_badge_map:
    default: "award-thoughtful=Thoughtful Response|award-processing=Valuable Processing Tip|award-critique=Valuable Critique|award-helped-my-work=Helped My Work|star2=Thoughtful Response|control_knobs=Valuable Processing Tip|trophy=Valuable Critique"
    type: list

  npn_critique_award_badge_min_reactions:
    default: 1
    min: 1

  # --- Recognition chips ------------------------------------------------------

  npn_critique_chips_enabled:
    default: true
    client: true

  npn_critique_chip_min_tier:
    default: "excellent"
    type: enum
    choices:
      - excellent
      - healthy

  # --- Leaderboard ----------------------------------------------------------

  npn_critique_leaderboard_size:
    default: 10
    min: 1
    max: 100
    client: true

  # --- Composer nudge banner ------------------------------------------------

  npn_critique_nudge_enabled:
    default: false
    client: true

  npn_critique_nudge_ratio:
    default: 2.0
    type: float

  npn_critique_nudge_copy:
    default: ""
    textarea: true
    client: true

  # --- Season close -----------------------------------------------------------

  npn_critique_season_topic_enabled:
    default: false

  npn_critique_season_topic_author:
    default: "system"
    type: username

  npn_critique_season_topic_pin_days:
    default: 4
    min: 0
